name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: Node — build + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:core
      - run: npm run test:ui # vitest over @fusion/core
      - run: npm run build:host -w @fusion/desktop # desktop host tsc
      - run: npm run compile:ext -w fusion-cockpit # VS Code extension tsc
      - run: npm run build:ui # webview (Svelte / Vite) build

  python:
    name: Python — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python -m pip install --upgrade pip
      # CPU-only torch keeps CI fast; the [test] extra below is then already satisfied.
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -e './lens-helper[test]'
      - run: cd lens-helper && python -m pytest tests/ -q
